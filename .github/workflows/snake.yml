name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate light snake SVG (npx)
        run: |
          mkdir -p dist
          npx platane/snk --user "${{ github.repository_owner }}" --output dist/github-contribution-grid-snake.svg

      - name: Generate dark snake SVG (npx)
        run: |
          mkdir -p dist
          npx platane/snk --user "${{ github.repository_owner }}" --palette github-dark --output dist/github-contribution-grid-snake-dark.svg

      - name: Publish generated files to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
